{% extends "base.html" %}
{% block content %}
<h2 class="mt-4">Settings</h2>
<form method="post" class="mt-3 w-100" style="max-width: 480px">
  <h5>Telegram Notifications</h5>
  <div class="mb-3">
    <label class="form-label">Bot Token</label>
    <input type="password" name="bot_token" class="form-control"
           placeholder="Leave blank to keep existing token">
    <small class="text-muted">Get from <a href="https://t.me/BotFather" target="_blank">@BotFather</a>. Leave blank to keep current value.</small>
  </div>
  <div class="mb-3">
    <label class="form-label">Your Telegram User ID</label>
    <input type="text" name="telegram_uid" class="form-control"
           value="{{ settings.get('telegram_uid', '') }}"
           placeholder="e.g. 123456789">
    <small class="text-muted">Find your ID by messaging <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a>.</small>
  </div>

  <h5 class="mt-4">Alert Thresholds</h5>
  <div class="row g-3 mb-3">
    <div class="col-6">
      <label class="form-label">Temperature (°C)</label>
      <input type="number" name="temp_threshold" class="form-control" step="0.5"
             value="{{ settings.get('temp_threshold', 35.0) }}">
    </div>
    <div class="col-6">
      <label class="form-label">Humidity (%)</label>
      <input type="number" name="humi_threshold" class="form-control" step="1"
             value="{{ settings.get('humi_threshold', 80.0) }}">
    </div>
  </div>

  <button type="submit" class="btn btn-primary w-100">Save</button>
</form>
{% endblock %}
