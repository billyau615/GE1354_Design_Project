<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drug Dispenser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { padding-top: 70px; background: #f8f9fa; }
    .card { border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .storage-count { font-size: 2.8rem; font-weight: 700; line-height: 1; }
    .storage-label { font-size: 0.85rem; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
    .sensor-val { font-size: 2rem; font-weight: 600; white-space: nowrap; }
    .pill-bar { height: 10px; border-radius: 5px; background: #e9ecef; overflow: hidden; margin-top: .5rem; }
    .pill-bar-fill { height: 100%; border-radius: 5px; transition: width .4s, background-color .4s; }
    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
                     letter-spacing: .08em; color: #6c757d; margin-bottom: .75rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="/">💊 Drug Dispenser</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/schedules">Schedules</a></li>
          <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container" style="max-width:900px">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
